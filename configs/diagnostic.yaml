model:
  vision: microsoft/resnet-50
  text: distilbert-base-uncased

diagnostic:
  checkpoint_path: checkpoints/baseline/best_model.pt
  train_split: 0.8
  eval_split: val
  retrieval_pool_split: val
  top_k: 5
  batch_size: 64
  num_workers: 4
  epsilon: 0.07
  max_length: 77
  max_captions: 100
  caption_stride: 1
  canonical_only: false
  output_dir: outputs/ot_diagnostic
  cache_image_embs: true
