experiments:
  baseline:
    batch_size: 64
    num_epochs: 50
    unfreeze_strategy: both_last_layer
    projection_lr: 0.001
    encoder_lr: 0.00005
    weight_decay: 0.01
    grad_clip_norm: 1.0
    seed: 42
    model_vision: microsoft/resnet-50
    model_text: distilbert-base-uncased
    train_split: 0.9
    num_workers: 4
    drop_last: true
    loss_type: baseline

  hard_negative_a025:
    batch_size: 64
    num_epochs: 50
    unfreeze_strategy: both_last_layer
    projection_lr: 0.001
    encoder_lr: 0.00005
    weight_decay: 0.01
    grad_clip_norm: 1.0
    seed: 42
    model_vision: microsoft/resnet-50
    model_text: distilbert-base-uncased
    train_split: 0.9
    num_workers: 4
    drop_last: true
    loss_type: hard_negative
    alpha: 0.25
    warmup_steps: 1000

  hard_negative_a05:
    batch_size: 64
    num_epochs: 50
    unfreeze_strategy: both_last_layer
    projection_lr: 0.001
    encoder_lr: 0.00005
    weight_decay: 0.01
    grad_clip_norm: 1.0
    seed: 42
    model_vision: microsoft/resnet-50
