    alpha: 0.5
    warmup_steps: 1000
    top_k: 16
    tau: 0.05
    update_freq: 10
    gate_sim: -0.05

  softmax_mix_k32:
    batch_size: 64
    num_epochs: 50
    unfreeze_strategy: both_last_layer
    projection_lr: 0.001
    encoder_lr: 0.00005
    weight_decay: 0.01
